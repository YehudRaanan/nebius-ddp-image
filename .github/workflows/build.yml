name: build-image

# Builds the DDP training image on GitHub's runners (fast network, no local
# Docker, no slow upload from home) and publishes it to GHCR. Runs on every
# push to main and can be triggered manually.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GHCR namespaces are lowercase; owner YehudRaanan -> yehudraanan
          tags: |
            ghcr.io/yehudraanan/nebius-trainer:v1
            ghcr.io/yehudraanan/nebius-trainer:latest
